[build]
  command = "npm run build"
  publish = "out"

[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200

[[redirects]]
  from = "/Ecosystem/*"
  to = "/Ecosystem/:splat"
  status = 200

[[redirects]]
  from = "/Interaction Design/*"
  to = "/Interaction Design/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/_next/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"
